name: CICD

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                node-version: 22

            - run: npm ci
    deploy:
        needs: test
        runs-on: ubuntu-latest

        steps:
            - name: Deploy to VPS
              uses: appleboy/ssh-action@v1
              with:
                host: ${{secrets.HOST}}
                username: ${{secrets.USERNAME}}
                key: ${{secrets.SSH_KEY}}
                script: |
                    cd /home/doekdiem/space-react
                    git pull origin main
                    npm ci
                    npm run build
                    pm2 restart space-react
